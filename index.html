<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sierpinski</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Curso Javascript</h1>
    <h2>Triangulo de Sierpinski</h2>
    <div class="selector">
        <h3>Numero inicial de puntos: </h3>
        <input type="text" id="pantalla">
        <br>
        <input type="button" value="Añade 1 punto" onclick="agregar('1')">
        <br>
        <input type="button" value="Añade 5 puntos" onclick="agregar('5')">
        <br>
        <input type="button" value="Añade 10 puntos" onclick="agregar('10')">
        <br>
        <input type="button" value="Añade 50 puntos" onclick="agregar('50')">
        <br>
        <input type="button" value="Añade 200 puntos" onclick="agregar('200')">
        <br><br>
        <input type="button" value="Reiniciar" onclick="borrar('C')">
    </div>
    <div class="lienzo">
        <canvas id="canvas" width="500" height="500"></canvas>
    </div>

    <script src="script.js"></script>
</body>

</html>
